services:
  postgres:
    image: postgres:16-alpine
    container_name: chrona-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chrona
      POSTGRES_USER: chrona
      POSTGRES_PASSWORD: chrona_password
    ports:
      - "5434:5432"
    volumes:
      - chrona_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chrona -d chrona"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  chrona_pg_data:
